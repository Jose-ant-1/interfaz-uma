<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/usuarios" class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Registrar Nuevo Usuario</h2>
      <p class="text-sm text-slate-500 font-medium italic">Crea una nueva cuenta de acceso para la plataforma</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Nombre Completo</label>
          <input type="text" name="nombre" [(ngModel)]="nuevoUsuario().nombre" required
                 placeholder="Ej: Juan Pérez"
                 class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Rol de Usuario</label>
          <select name="permiso" [(ngModel)]="nuevoUsuario().permiso" required
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50 appearance-none">
            <option value="USER">Usuario Estándar</option>
            <option value="ADMIN">Administrador</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="nuevoUsuario().email" required email
               placeholder="usuario@ejemplo.com"
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña Temporal</label>
        <input type="password" name="contrasenia" [(ngModel)]="nuevoUsuario().contrasenia" required
               placeholder="Mínimo 4 caracteres"
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
        <p class="mt-2 text-[11px] text-slate-400 italic">El usuario podrá cambiar esta contraseña desde su perfil.</p>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button type="submit" [disabled]="!f.valid"
                class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md disabled:opacity-50">
          Crear Usuario
        </button>
        <button type="button" routerLink="/dashboard/usuarios"
                class="px-6 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
