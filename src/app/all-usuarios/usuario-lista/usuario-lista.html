<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
  <table class="w-full text-left border-collapse">
    <thead>
    <tr class="bg-slate-50 border-b border-slate-200">
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ID</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Usuario</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Email</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Rol</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Acciones</th>
    </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      @for (u of usuarios(); track u.id) {
        <tr class="hover:bg-slate-50/50 transition-colors group">
          <td class="px-6 py-4 text-sm font-mono text-slate-400">#{{ u.id }}</td>

          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-700">{{ u.nombre }}</span>
            </div>
          </td>

          <td class="px-6 py-4 text-sm text-slate-600 font-medium">
            {{ u.email }}
          </td>

          <td class="px-6 py-4">
            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tight"
                  [class]="u.permiso === 'ADMIN' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-green-50 text-green-600 border border-green-100'">
              {{ u.permiso }}
            </span>
          </td>

          <td class="px-6 py-4 text-right">
            <div class="flex justify-end gap-2">
              <button [routerLink]="['/dashboard/usuarios/editar', u.id]"
                      class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition"
                      title="Editar">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>

              <button (click)="eliminarUsuario(u.id!)"
                      class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Eliminar">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="py-20 text-center">
            @if (cargando()) {
              <div class="flex justify-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
              </div>
            } @else {
              <div class="flex flex-col items-center gap-3">
                <div class="p-4 bg-slate-100 rounded-full text-slate-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                  </svg>
                </div>
                <p class="text-slate-400 font-medium">No hay usuarios registrados</p>
              </div>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
