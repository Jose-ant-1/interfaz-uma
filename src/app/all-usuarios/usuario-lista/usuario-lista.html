<div class="relative w-full md:w-96 mb-4">
  <input
    type="text"
    (input)="onSearch($event)"
    placeholder="Buscar por nombre o email..."
    class="w-full pl-10 pr-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm"
  />
</div>

<div>
  <div>
    <h2 class="text-2xl font-bold text-slate-800">Panel de Usuarios</h2>
    <p class="text-slate-500 font-medium">Todos los usuarios registrados en la base de datos</p>
  </div>

  <br>
  <div class="grid grid-cols-1 gap-4">
    @for (u of usuarios(); track u.id) {
      <app-usuario-card
        [usuario]="u"
        (onDelete)="eliminarUsuario($event)">
      </app-usuario-card>
    } @empty {
      <div class="py-20 text-center bg-white rounded-2xl border border-dashed border-slate-300">
        <p class="text-slate-400">No se encontraron usuarios</p>
      </div>
    }
  </div></div>
