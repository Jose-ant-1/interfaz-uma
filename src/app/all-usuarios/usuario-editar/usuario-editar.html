<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/usuarios" class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Editar Usuario</h2>
      <p class="text-sm text-slate-500 font-medium italic">Modificando perfil de #{{ usuarioEdit().id }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 relative">
    @if (cargando()) {
      <div class="absolute inset-0 bg-white/50 backdrop-blur-sm flex items-center justify-center z-10 rounded-2xl">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
    }

    <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Nombre Completo</label>
          <input type="text" name="nombre" [(ngModel)]="usuarioEdit().nombre" required
                 class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50 font-bold">
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Rol de Usuario</label>
          <div class="relative">
            <select name="permiso" [(ngModel)]="usuarioEdit().permiso" required
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50 appearance-none font-semibold">
              <option value="USER">Usuario Estándar</option>
              <option value="ADMIN">Administrador</option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="usuarioEdit().email" required email
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50 text-slate-600 font-medium">
      </div>

      <div class="pt-4 border-t border-slate-50">
        <label class="block text-sm font-bold text-slate-700 mb-2">
          Nueva Contraseña
          <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded ml-2 uppercase tracking-tighter">Opcional</span>
        </label>
        <input type="password" name="contrasenia" [(ngModel)]="usuarioEdit().contrasenia"
               placeholder="Dejar en blanco para no cambiarla"
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
        <p class="mt-2 text-[11px] text-slate-400 italic">
          Si rellenas este campo, la contraseña del usuario se actualizará permanentemente.
        </p>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button type="submit" [disabled]="!f.valid || cargando()"
                class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md disabled:opacity-50">
          Guardar Cambios
        </button>
        <button type="button" routerLink="/dashboard/usuarios"
                class="px-6 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
