<div class="flex h-screen bg-slate-100">

  <!-- OVERLAY (solo móvil) -->
  @if (menuAbierto()) {
    <div
      class="fixed inset-0 bg-black/50 z-40 md:hidden"
      (click)="cerrarMenu()">
    </div>
  }

  <!-- SIDEBAR -->
  <aside
    class="fixed md:static z-50 top-0 left-0 h-full w-64 bg-slate-900 text-white flex flex-col transform transition-transform duration-300 md:translate-x-0"
    [class.-translate-x-full]="!menuAbierto()"
    [class.translate-x-0]="menuAbierto()"
  >
    <!-- Logo -->
    <div class="p-6 text-xl font-bold border-b border-slate-800 text-blue-400">
      UMA Panel
    </div>

    <!-- NAV -->
    <nav class="flex-1 p-4 space-y-2">
      <p class="text-xs font-semibold text-slate-500 uppercase px-2 mb-2">
        Menú Principal
      </p>

      <a routerLink="/dashboard/monitoreos"
         (click)="cerrarMenu()"
         routerLinkActive="bg-blue-600"
         class="block px-4 py-2 rounded transition hover:bg-slate-800">
        Mis monitoreos
      </a>

      <a routerLink="/dashboard/paginas"
         (click)="cerrarMenu()"
         routerLinkActive="bg-blue-600"
         class="block px-4 py-2 rounded transition hover:bg-slate-800">
        Todas las Paginas
      </a>

      <a routerLink="/dashboard/difusion-masiva"
         (click)="cerrarMenu()"
         routerLinkActive="bg-blue-600"
         class="block px-4 py-2 rounded transition hover:bg-slate-800">
        Difusión
      </a>

      @if (esAdmin()) {
        <div class="pt-6 mt-6 border-t border-slate-800">
          <p class="text-xs font-semibold text-red-400 uppercase px-2 mb-2">
            Administración General
          </p>

          <a routerLink="/dashboard/todos-monitoreos"
             (click)="cerrarMenu()"
             routerLinkActive="bg-red-600/20 text-red-400"
             class="block px-4 py-2 rounded text-red-100 hover:bg-slate-800 transition mb-1">
            Todos los monitoreos
          </a>

          <a routerLink="/dashboard/usuarios"
             (click)="cerrarMenu()"
             routerLinkActive="bg-red-600/20 text-red-400"
             class="block px-4 py-2 rounded text-red-100 hover:bg-slate-800 transition">
            Gestionar Usuarios
          </a>
        </div>
      }
    </nav>

    <!-- USER -->
    <a routerLink="/dashboard/perfil"
       (click)="cerrarMenu()"
       class="block p-4 bg-slate-800 text-sm flex items-center gap-3 hover:bg-slate-700 transition-colors border-t border-slate-700">
      <div class="flex-1">
        <p class="font-bold leading-none text-slate-100">{{ userName() }}</p>
        <p class="text-[10px] text-slate-400 uppercase tracking-tighter mt-1">
          {{ userRole() }}
        </p>
      </div>
    </a>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 md:px-8">

      <!-- IZQUIERDA -->
      <div class="flex items-center gap-3">
        <!-- HAMBURGUESA -->
        <button
          class="md:hidden text-slate-700 text-xl"
          (click)="toggleMenu()">
          ☰
        </button>

        <h2 class="text-sm md:text-lg font-medium text-slate-700">
          Monitoreo De Páginas
        </h2>
      </div>

      <!-- DERECHA -->
      <div class="flex items-center gap-2 md:gap-4">

        <!-- Página -->
        <button routerLink="/dashboard/paginas/nueva"
                class="bg-slate-600 text-white px-2 md:px-3 py-2 rounded-lg text-[11px] md:text-sm font-bold hover:bg-slate-700 transition">
          + Página
        </button>

        <!-- Monitoreo -->
        <button routerLink="/dashboard/monitoreos/nuevo"
                class="bg-blue-600 text-white px-3 py-2 rounded-lg text-xs md:text-sm font-bold hover:bg-blue-700 transition">
          + Monitoreo
        </button>

        <!-- Usuario (admin) -->
        @if (esAdmin()) {
          <button routerLink="/dashboard/usuarios/nuevo"
                  class="hidden md:block bg-indigo-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-950 transition">
            + Usuario
          </button>
        }

        <!-- Divider -->
        <div class="hidden md:block h-6 w-px bg-slate-200 mx-2"></div>

        <!-- Salir -->
        <button (click)="cerrarSesion()"
                class="flex items-center gap-2 px-2 md:px-4 py-2 text-xs md:text-sm text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
          Salir
        </button>

      </div>
    </header>

    <!-- CONTENIDO -->
    <section class="p-4 md:p-8 overflow-y-auto flex-1 bg-slate-50">
      <router-outlet></router-outlet>
    </section>

  </main>
</div>
