<div class="flex h-screen bg-slate-100">
  <aside class="w-64 bg-slate-900 text-white flex flex-col">
    <div class="p-6 text-xl font-bold border-b border-slate-800 text-blue-400">UMA Panel</div>

    <nav class="flex-1 p-4 space-y-2">
      <p class="text-xs font-semibold text-slate-500 uppercase px-2 mb-2">Menú Principal</p>

      <a routerLink="/dashboard/monitoreos" routerLinkActive="bg-blue-600" class="block px-4 py-2 rounded transition hover:bg-slate-800">
  <span class="flex items-center gap-3">
    Mis monitoreos
  </span>
      </a>

      <a routerLink="/dashboard/paginas" routerLinkActive="bg-blue-600" class="block px-4 py-2 rounded transition hover:bg-slate-800">
  <span class="flex items-center gap-3">
    Todas las Paginas
  </span>
      </a>
      <a routerLink="/dashboard/difusion-masiva" routerLinkActive="bg-blue-600" class="block px-4 py-2 rounded transition hover:bg-slate-800">
      <span class="flex items-center gap-3">
      Difusión
      </span>
      </a>

      @if (esAdmin()) {
        <div class="pt-6 mt-6 border-t border-slate-800">
          <p class="text-xs font-semibold text-red-400 uppercase px-2 mb-2">Administración General</p>

          <a routerLink="/dashboard/todos-monitoreos"
             routerLinkActive="bg-red-600/20 text-red-400"
             class="block px-4 py-2 rounded text-red-100 hover:bg-slate-800 transition mb-1">
            <span class="flex items-center gap-3">Todos los monitoreos</span>
          </a>

          <a routerLink="/dashboard/usuarios"
             routerLinkActive="bg-red-600/20 text-red-400"
             class="block px-4 py-2 rounded text-red-100 hover:bg-slate-800 transition">
            <span class="flex items-center gap-3">Gestionar Usuarios</span>
          </a>
        </div>
      }
    </nav>

    <a routerLink="/dashboard/perfil" class="block p-4 bg-slate-800 text-sm flex items-center gap-3 hover:bg-slate-700 transition-colors border-t border-slate-700">
      <div class="flex-1">
        <p class="font-bold leading-none text-slate-100">{{ userName() }}</p>
        <p class="text-[10px] text-slate-400 uppercase tracking-tighter mt-1">{{ userRole() }}</p>
      </div>
    </a>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
      <h2 class="text-lg font-medium text-slate-700">Monitoreo De Páginas</h2>

      <div class="flex items-center gap-4">
        <button routerLink="/dashboard/paginas/nueva"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-sm">
          + Nueva Pagina
        </button>

        @if (esAdmin()) {
          <button routerLink="/dashboard/usuarios/nuevo"
                  class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">
            + Nuevo Usuario
          </button>
        }

        <div class="h-6 w-px bg-slate-200 mx-2"></div>

        <button (click)="cerrarSesion()" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
          <span class="font-bold text-sm">Salir</span>
        </button>
      </div>
    </header>

    <section class="p-8 overflow-y-auto flex-1 bg-slate-50">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
