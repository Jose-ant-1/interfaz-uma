<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/difusion-masiva" class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Crear Pack de Monitoreos</h2>
      <p class="text-sm text-slate-500 font-medium italic">Agrupa tus monitoreos bajo un nombre para difundirlos fácilmente</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre del Pack</label>
        <input type="text"
               [(ngModel)]="nombrePlantilla"
               placeholder="Ej: Pack Soporte Mañana"
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-3">Selecciona los Monitoreos a incluir</label>
        <div class="grid grid-cols-1 gap-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
          @for (m of misMonitoreos(); track m.id) {
            <label class="flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all group">
              <div class="flex items-center gap-3">
                <input type="checkbox"
                       [checked]="estaSeleccionado(m.id)"
                       (change)="toggleMonitoreo(m.id)"
                       class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                <span class="text-sm font-medium text-slate-700 group-hover:text-blue-700">{{ m.nombre }}</span>
              </div>
              <span class="text-[10px] font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded">ID: {{ m.id }}</span>
            </label>
          } @empty {
            <p class="text-sm text-slate-400 italic p-4 text-center">No tienes monitoreos creados para agrupar.</p>
          }
        </div>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button (click)="guardar()"
                [disabled]="!nombrePlantilla || seleccionados().length === 0 || cargando()"
                class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md disabled:opacity-50 flex items-center justify-center gap-2">
          @if (cargando()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
            <i class="bi bi-save2"></i>
            Guardar Plantilla
          }
        </button>
      </div>
    </div>
  </div>
</div>
