<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/difusion/administrar-plantillas"
            class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Editar Plantilla</h2>
      <p class="text-sm text-slate-500 font-medium italic text-blue-600">Editando: {{ nombrePlantilla }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Nombre del Pack</label>
        <input type="text" [(ngModel)]="nombrePlantilla"
               class="w-full px-4 py-4 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-700">
      </div>

      <div class="relative">
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Buscar Monitoreos</label>
        <div class="relative">
          <input type="text" (input)="onSearch($event)"
                 placeholder="Filtrar por nombre o ID..."
                 class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-medium text-slate-600 bg-slate-50/30">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">Monitoreos Disponibles</label>
        <div class="grid grid-cols-1 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          @if (cargando()) {
            <div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div></div>
          } @else {
            @for (m of monitoreosFiltrados(); track m.id) {
              <label class="flex items-center justify-between p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-white hover:border-slate-200 transition-all cursor-pointer group">
                <div class="flex items-center gap-4">
                  <input type="checkbox" [checked]="estaSeleccionado(m.id)" (change)="toggleMonitoreo(m.id)"
                         class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                  <div class="flex flex-col">
                    <span class="text-sm font-bold text-slate-700 group-hover:text-blue-700">{{ m.nombre }}</span>
                    <span class="text-[10px] text-slate-400 font-mono">ID: #{{ m.id }}</span>
                  </div>
                </div>
                @if (estaSeleccionado(m.id)) {
                  <span class="text-blue-500 font-bold text-[10px] uppercase tracking-widest">Seleccionado</span>
                }
              </label>
            } @empty {
              <div class="text-center py-8 border border-dashed border-slate-200 rounded-xl text-slate-400 italic text-sm">
                No se encontraron monitoreos.
              </div>
            }
          }
        </div>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button (click)="actualizar()" [disabled]="!nombrePlantilla || seleccionados().length === 0 || cargando()"
                class="flex-1 bg-slate-800 text-white py-3.5 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg disabled:opacity-50">
          Guardar Cambios
        </button>
        <button routerLink="/dashboard/difusion/administrar-plantillas" class="px-6 py-3.5 text-slate-500 font-bold">
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
