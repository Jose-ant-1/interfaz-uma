<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/difusion/administrar-plantillas"
            class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Editar Plantilla</h2>
      <p class="text-sm text-slate-500 font-medium italic text-blue-600">Editando: {{ nombrePlantilla }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Nombre del Pack</label>
        <input type="text" [(ngModel)]="nombrePlantilla"
               placeholder="Ej: Pack Soporte Mañana"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-blue-50 focus:border-blue-500 transition outline-none font-medium">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">
          Páginas incluidas <span class="text-blue-500">({{ seleccionados().length }})</span>
        </label>

        <div class="grid grid-cols-1 gap-2 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
          @if (cargando()) {
            <div class="py-10 text-center"><div class="animate-spin h-6 w-6 border-b-2 border-blue-600 mx-auto"></div></div>
          } @else {
            @for (m of misMonitoreosDisponibles(); track m.id) {
              <label class="flex items-center justify-between p-3.5 rounded-xl border border-slate-100 hover:bg-blue-50/50 hover:border-blue-200 cursor-pointer transition-all group"
                     [class.bg-blue-50]="estaSeleccionado(m.id)"
                     [class.border-blue-200]="estaSeleccionado(m.id)">
                <div class="flex items-center gap-3">
                  <div class="relative flex items-center">
                    <input type="checkbox"
                           [checked]="estaSeleccionado(m.id)"
                           (change)="toggleMonitoreo(m.id)"
                           class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                  </div>
                  <div class="flex flex-col">
                    <span class="text-sm font-bold text-slate-700 group-hover:text-blue-700">{{ m.nombre }}</span>
                    <span class="text-[10px] text-slate-400 font-mono">ID: #{{ m.id }}</span>
                  </div>
                </div>

                @if (estaSeleccionado(m.id)) {
                  <span class="text-blue-500 font-bold text-[10px] uppercase tracking-widest">Incluida</span>
                }
              </label>
            } @empty {
              <p class="text-sm text-slate-400 italic p-4 text-center border border-dashed rounded-xl">No tienes monitoreos creados.</p>
            }
          }
        </div>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button (click)="actualizar()"
                [disabled]="!nombrePlantilla || seleccionados().length === 0 || cargando()"
                class="flex-1 bg-slate-800 text-white py-3.5 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg shadow-slate-200 disabled:opacity-50 flex items-center justify-center gap-2">
          @if (cargando()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
            <i class="bi bi-check-lg text-lg"></i>
            Guardar Cambios
          }
        </button>
      </div>
    </div>
  </div>
</div>
