<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/difusion/administrar-grupos"
            class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Editar Grupo</h2>
      <p class="text-sm text-slate-500 font-medium italic text-indigo-600">Editando: {{ nombreGrupo }}</p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div class="space-y-6">

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Nombre del Grupo</label>
        <input type="text" [(ngModel)]="nombreGrupo"
               placeholder="Ej: Equipo de Ventas"
               class="w-full px-4 py-4 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-medium text-slate-700">
      </div>

      <div class="relative">
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Buscar Usuario</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text"
                 (input)="onSearch($event)"
                 placeholder="Nombre o correo electrónico..."
                 class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-sm font-medium text-slate-600 bg-slate-50/30">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-3 uppercase tracking-wide">Integrantes del Grupo</label>

        <div class="grid grid-cols-1 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
          @if (cargando()) {
            <div class="flex flex-col items-center justify-center py-12 text-slate-400">
              <div class="w-8 h-8 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
              <p class="text-sm font-medium animate-pulse">Cargando usuarios...</p>
            </div>
          } @else {
            @for (u of usuariosFiltrados(); track u.id) {
              <label class="flex items-center justify-between p-4 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-white hover:border-slate-200 transition-all cursor-pointer group">
                <div class="flex items-center gap-4">
                  <div class="relative flex items-center">
                    <input type="checkbox"
                           [checked]="estaSeleccionado(u.id!)"
                           (change)="toggleUsuario(u.id!)"
                           class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                  </div>
                  <div class="flex flex-col">
                    <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-700">{{ u.nombre }}</span>
                    <span class="text-xs text-slate-400">{{ u.email }}</span>
                  </div>
                </div>

                @if (estaSeleccionado(u.id!)) {
                  <span class="text-indigo-500 font-bold text-[10px] uppercase tracking-widest">En el grupo</span>
                }
              </label>
            } @empty {
              <div class="text-center py-8 border border-dashed border-slate-200 rounded-xl">
                <p class="text-sm text-slate-400 italic">
                  {{ filtro() ? 'No se han encontrado usuarios que coincidan con la búsqueda.' : 'No hay usuarios disponibles.' }}
                </p>
              </div>
            }
          }
        </div>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button (click)="actualizar()"
                [disabled]="!nombreGrupo || seleccionados().length === 0 || cargando()"
                class="flex-1 bg-slate-800 text-white py-3.5 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg disabled:opacity-50 flex items-center justify-center gap-2">
          @if (cargando()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          } @else {
            Guardar Cambios
          }
        </button>

        <button routerLink="/dashboard/difusion/administrar-grupos"
                class="px-6 py-3.5 text-slate-500 font-bold hover:text-slate-700 transition">
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
