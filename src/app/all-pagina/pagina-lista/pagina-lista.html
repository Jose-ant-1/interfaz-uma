<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
  <div>
    <h2 class="text-2xl font-bold text-slate-800">Panel de Páginas</h2>
    <p class="text-slate-500 font-medium">Todos las páginas registradas en la base de datos</p>
  </div>

  <div class="relative w-full md:w-96">
    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </span>
    <input
      type="text"
      (input)="onSearch($event)"
      placeholder="Buscar por nombre o URL..."
      class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm"
    />
  </div>
</div>


<br>
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
  <table class="w-full text-left border-collapse">
    <thead>
    <tr class="bg-slate-50 border-b border-slate-200">
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ID</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Nombre / Dominio</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">URL Destino</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Notas</th>
      <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Acciones</th>
    </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      @for (p of paginas(); track p.id) {
        <tr class="hover:bg-slate-50/50 transition-colors group">
          <td class="px-6 py-4 text-sm font-mono text-slate-400">#{{ p.id }}</td>
          <td class="px-6 py-4">
            <span class="font-bold text-slate-700 block">{{ p.nombre }}</span>
          </td>
          <td class="px-6 py-4">
            <a [href]="formatearUrl(p.url)"
               target="_blank"
               rel="noopener noreferrer"
               class="text-blue-500 hover:text-blue-700 text-sm font-medium flex items-center gap-1">
              {{ p.url }}
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>
          </td>
          <td class="px-6 py-4 text-sm text-slate-500 italic">
            {{ p.notaInfo || 'Sin información adicional' }}
          </td>
          <td class="px-6 py-4 text-right">
            <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button [routerLink]="['/dashboard/paginas/editar', p.id]"
                      class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition"
                      title="Editar">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button (click)="eliminar(p.id!)"
                      class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"
                      title="Eliminar">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" class="py-20 text-center">
            <div class="flex flex-col items-center gap-3">
              <div class="p-4 bg-slate-100 rounded-full text-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <p class="text-slate-400 font-medium">No hay páginas registradas en el catálogo.</p>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
