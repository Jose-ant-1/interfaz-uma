<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 px-4 md:px-0">
  <div>
    <h2 class="text-2xl font-bold text-slate-800 tracking-tight">
      Panel de Páginas
    </h2>
    <p class="text-sm text-slate-500 font-medium">
      Gestiona y explora el catálogo de sitios web
    </p>
  </div>

  <div class="relative w-full md:w-96 group">
    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </span>

    <input
      type="text"
      (input)="onSearch($event)"
      placeholder="Buscar por nombre o URL..."
      class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all shadow-sm text-sm"
    />
  </div>
</div>

<div class="flex flex-col gap-4 w-full px-4 md:px-0">
  @for (p of paginas(); track p.id) {
    <app-pagina-card
      [pagina]="p"
      (onDelete)="eliminar($event)"
      class="w-full">
    </app-pagina-card>
  } @empty {
    <div class="py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-100">
      <div class="flex flex-col items-center">
        <svg class="w-12 h-12 text-slate-200 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/>
        </svg>
        <p class="text-slate-400 font-medium">No se han encontrado resultados.</p>
      </div>
    </div>
  }
</div>
