<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <button routerLink="/dashboard/paginas" class="p-2 text-slate-400 hover:text-slate-600 bg-white rounded-lg border border-slate-200 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div>
      <h2 class="text-2xl font-bold text-slate-800">
        {{ esEdicion() ? 'Editar Página #' + pagina().id : 'Registrar Nueva Página' }}
      </h2>
      <p class="text-sm text-slate-500 font-medium italic">
        {{ esEdicion() ? 'Modifica los detalles de la web seleccionada' : 'Añade un nuevo destino al catálogo global' }}
      </p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Nombre / Dominio</label>
        <input type="text" name="nombre" [(ngModel)]="pagina().nombre" required
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">URL Destino</label>
        <input type="text" name="url" [(ngModel)]="pagina().url" required
               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50 font-mono text-sm">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">Notas Adicionales</label>
        <textarea name="notaInfo" [(ngModel)]="pagina().notaInfo" rows="3"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all bg-slate-50"></textarea>
      </div>

      <div class="flex items-center gap-4 pt-4 border-t border-slate-100">
        <button type="submit" [disabled]="!f.valid"
                class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md disabled:opacity-50">
          {{ esEdicion() ? 'Guardar Cambios' : 'Crear Página' }}
        </button>
        <button type="button" routerLink="/dashboard/paginas"
                class="px-8 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
