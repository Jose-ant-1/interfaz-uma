<div class="w-full bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all flex flex-col md:flex-row md:items-center md:justify-between gap-4">

  <!-- IZQUIERDA -->
  <div class="flex items-start md:items-center gap-4 md:gap-6">

    <!-- ICONO -->
    <div class="p-3 bg-slate-50 rounded-lg text-slate-400 shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9h18"/>
      </svg>
    </div>

    <!-- TEXTO -->
    <div class="min-w-0">
      <h3 class="font-bold text-slate-800 text-base md:text-lg truncate">
        {{ monitoreo.nombre }}
      </h3>
      <p class="text-xs md:text-sm text-slate-400 font-mono truncate">
        {{ monitoreo.paginaUrl }}
      </p>
    </div>
  </div>

  <!-- DERECHA -->
  <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-8">

    <!-- ESTADO -->
    <div class="flex items-center gap-2 md:gap-3">
      <span class="relative flex h-3 w-3">
        @if (estadoVisual() !== 'CHECKING') {
          <span [class]="'animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ' + (estadoVisual() === 'ONLINE' ? 'bg-green-400' : 'bg-red-400')"></span>
        }
        <span [class]="'relative inline-flex rounded-full h-3 w-3 ' + (estadoVisual() === 'ONLINE' ? 'bg-green-500' : estadoVisual() === 'OFFLINE' ? 'bg-red-500' : 'bg-slate-300')"></span>
      </span>

      <span class="text-xs md:text-sm font-medium text-slate-600">
        {{ estadoVisual() === 'ONLINE' ? 'En línea' : estadoVisual() === 'OFFLINE' ? 'Caída (' + (monitoreo.estado || monitoreo.ultimoEstado) + ')' : 'Comprobando...' }}
      </span>
    </div>

    <!-- BOTONES -->
    <div class="flex flex-wrap items-center gap-2 md:gap-4">

      <!-- VER -->
      <button [routerLink]="['/dashboard/monitoreo', monitoreo.id]"
              class="flex-1 md:flex-none px-4 md:px-6 py-2 bg-slate-100 text-slate-700 rounded-lg text-xs md:text-sm font-bold hover:bg-slate-200 transition">
        Ver
      </button>

      <!-- ADMIN / OWNER -->
      @if (esPropietario() || isAdmin) {
        <div class="flex items-center gap-1 md:gap-2 border-l pl-2 md:pl-4 border-slate-100">

          <!-- EDIT -->
          <button [routerLink]="['/dashboard/monitoreo/edit', monitoreo.id]"
                  class="p-2 text-slate-400 hover:text-blue-600 transition"
                  title="Editar">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>

          <!-- DELETE -->
          <button (click)="eliminarMonitoreo(monitoreo.id!)"
                  class="p-2 text-slate-400 hover:text-red-500 transition"
                  title="Eliminar">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>

        </div>
      }

    </div>
  </div>
</div>
