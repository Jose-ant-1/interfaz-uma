<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center gap-4 mb-2">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Nuevo Monitoreo</h2>
      <p class="text-sm text-slate-500 font-medium italic text-emerald-600">
        Asigna una página existente para supervisión
      </p>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">
    <div>
      <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Nombre del Monitoreo</label>
      <input type="text" [(ngModel)]="nombre"
             placeholder="Ej: Check Servidor Principal"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all font-medium">
    </div>

    <div>
      <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Seleccionar Página</label>
      <div class="relative">
        <select [(ngModel)]="urlSeleccionada"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-emerald-500 outline-none transition-all appearance-none cursor-pointer">
          <option value="" disabled selected>Escoge una de las páginas de la base de datos...</option>
          @for (pagina of paginasExistentes(); track pagina.id) {
            <option [value]="pagina.url">{{ pagina.url }}</option>
          }
        </select>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
          <i class="bi bi-chevron-down"></i>
        </div>
      </div>
      @if (paginasExistentes().length === 0) {
        <p class="mt-2 text-xs text-amber-600 italic">No se encontraron páginas en la base de datos.</p>
      }
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Frecuencia (Minutos)</label>
        <input type="number" [(ngModel)]="minutos" min="1"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none transition-all">
      </div>
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Reintentos</label>
        <input type="number" [(ngModel)]="repeticiones" min="1"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none transition-all">
      </div>
    </div>

    <div class="pt-4">
      <button (click)="guardar()"
              [disabled]="!nombre || !urlSeleccionada || cargando()"
              class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg flex items-center justify-center gap-3 disabled:opacity-50">
        @if (cargando()) {
          <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          Procesando...
        } @else {
          <i class="bi bi-shield-check text-lg"></i>
          Activar Monitoreo
        }
      </button>
    </div>
  </div>
</div>
