<div class="space-y-6">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-2xl font-bold text-slate-800">Panel de Monitoreos Global</h2>
      <p class="text-slate-500 font-medium">Todos los monitoreos registrados en UMA</p>
    </div>

    <div class="relative flex-1 max-w-md">
      <input type="text"
             [(ngModel)]="searchTerm"
             placeholder="Buscar por nombre o URL..."
             class="w-full pl-10 pr-4 py-2 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all shadow-sm">
      <svg class="w-5 h-5 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>

    <div class="bg-red-50 text-red-600 px-4 py-2 rounded-xl border border-red-100 font-bold whitespace-nowrap">
      Mostrando: {{ monitoreosFiltrados().length }} / {{ monitoreos().length }}
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4">
    @for (item of monitoreosFiltrados(); track item.id) {
      <app-monitoreo-card [monitoreo]="item" [isAdmin]="true"></app-monitoreo-card>
    } @empty {
      <div class="py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-100">
        <p class="text-slate-400">No se encontraron monitoreos que coincidan con la búsqueda.</p>
      </div>
    }
  </div>
</div>
