<div class="max-w-4xl mx-auto p-8">
  <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">

    <div class="flex justify-between items-center mb-8 pb-6 border-b border-slate-100">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Configurar Monitoreo</h1>
        <p class="text-slate-400 text-sm">Modifica los parámetros de control para esta web</p>
      </div>
      <div class="flex gap-3">
        <button (click)="guardar()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
          Guardar Cambios
        </button>
      </div>
    </div>

    @if (cargando()) {
      <div class="flex justify-center py-10">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
    } @else {
      <div class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nombre Identificador</label>
          <input [(ngModel)]="monitoreo.nombre" type="text"
                 class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 font-bold focus:outline-none focus:border-blue-500 transition">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">URL de la página</label>
          <input [(ngModel)]="monitoreo.paginaUrl" type="url" readonly
                 class="w-full bg-slate-100 border border-slate-200 rounded-xl p-4 text-slate-500 font-mono text-sm cursor-not-allowed">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Intervalo de revisión</label>
            <div class="relative">
              <input [(ngModel)]="monitoreo.minutos" type="number"
                     class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 font-bold focus:outline-none focus:border-blue-500 transition">
              <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm"></span>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Reintentos antes de alerta</label>
            <input [(ngModel)]="monitoreo.repeticiones" type="number"
                   class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 font-bold focus:outline-none focus:border-blue-500 transition">
          </div>
        </div>

        <div class="pt-6 mt-6 border-t border-slate-100">
          <h2 class="text-sm font-bold text-slate-900 mb-4">Gestionar Invitados</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            @for (user of usuariosSistema(); track user.id) {
              <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                <div class="flex flex-col">
                  <span class="text-sm font-bold text-slate-700">{{ user.nombre }}</span>
                  <span class="text-xs text-slate-400">{{ user.email }}</span>
                </div>

                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox"
                         [checked]="esInvitado(user.id!)"
                         (change)="toggleInvitado(user)"
                         class="sr-only peer">
                  <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer
                    peer-checked:after:translate-x-full peer-checked:after:border-white
                    after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                    after:bg-white after:border-gray-300 after:border after:rounded-full
                    after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600">
                  </div>
                </label>
              </div>
            }
          </div>
        </div>
      </div>
    }

    <div class="mt-10 pt-6 border-t border-slate-50 flex justify-between items-center">
      <button routerLink="/dashboard/monitoreos" class="text-slate-400 hover:text-slate-600 flex items-center gap-2 transition font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 7-7" />
        </svg>
        Cancelar y volver
      </button>
    </div>
  </div>
</div>
