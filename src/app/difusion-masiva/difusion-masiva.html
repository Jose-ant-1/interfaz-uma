<div class="container mt-4">
  <div class="card border-0 shadow-lg">
    <div class="card-header bg-gradient bg-primary text-white p-3">
      <h3 class="mb-0"> Difusión de Accesos</h3>
    </div>

    <div class="card-body p-4">
      <div class="row g-4">

        <div class="col-md-6">
          <label class="form-label fw-bold">1. Elegir Plantilla de Monitoreos</label>
          <select class="form-select form-select-lg"
                  [ngModel]="idPlantillaSeleccionada()"
                  (ngModelChange)="idPlantillaSeleccionada.set($event)">
            <option [value]="null" disabled>Selecciona un pack...</option>
            @for (p of plantillas(); track p.id) {
              <option [value]="p.id">
                {{ p.nombre }} ({{ p.monitoreos?.length }} items)
              </option>
            }
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">2. Usuario a Invitar</label>
          <select class="form-select form-select-lg"
                  [ngModel]="emailUsuarioDestino()"
                  (ngModelChange)="emailUsuarioDestino.set($event)">
            <option value="" disabled>Selecciona al usuario...</option>
            @for (u of usuarios(); track u.id) {
              <option [value]="u.email">{{ u.nombre }} ({{ u.email }})</option>
            }
          </select>
        </div>

      </div>

      <div class="mt-5">
        <button class="btn btn-success btn-lg w-100 py-3 fw-bold"
                (click)="ejecutarDifusion()"
                [disabled]="cargando() || !idPlantillaSeleccionada() || !emailUsuarioDestino()">

          @if (cargando()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
            Procesando...
          } @else {
            Asignar Monitoreos de Golpe
          }
        </button>
      </div>
    </div>
  </div>
  @if (plantillaElegida()) {
    <div class="alert alert-light mt-3 border">
      <small class="text-muted">
        Se realizarán {{ plantillaElegida()?.monitoreos?.length || 0 }}
        inserciones de seguridad en la tabla de invitados.
      </small>
    </div>
  }
</div>
