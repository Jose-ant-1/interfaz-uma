@if (usuario(); as u) {
  <div>
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">

      <div class="h-32 bg-gradient-to-r from-slate-900 via-blue-900 to-slate-900"></div>

      <div class="px-8 pb-8">
        <div class="relative flex justify-between items-end -mt-12 mb-8">
          <span class="px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest shadow-sm border"
                [class]="u.permiso === 'ADMIN' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100'">
            {{ u.permiso }}
          </span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">

          <div class="md:col-span-2 space-y-8">
            <div>
              <h2 class="text-3xl font-bold text-slate-900">{{ u.nombre }}</h2>
              <p class="text-slate-500 font-medium flex items-center gap-2 mt-1">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                {{ u.email }}
              </p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

              <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                <p class="text-[10px] uppercase font-bold text-slate-400 mb-1 tracking-widest">Identificador</p>
                <p class="text-xl font-bold text-slate-700">#{{ u.id }}</p>
              </div>

              <div class="p-5 bg-blue-50 rounded-2xl border border-blue-100">
                <p class="text-[10px] uppercase font-bold text-blue-400 mb-1 tracking-widest">Mis Monitoreos</p>
                <div class="flex items-end gap-2">
                  <p class="text-2xl font-bold text-blue-700">{{ propiosCount() }}</p>
                  <span class="text-xs text-blue-500 mb-1 font-medium">propios</span>
                </div>
              </div>

              <div class="p-5 bg-indigo-50 rounded-2xl border border-indigo-100">
                <p class="text-[10px] uppercase font-bold text-indigo-400 mb-1 tracking-widest">Colaboraciones</p>
                <div class="flex items-end gap-2">
                  <p class="text-2xl font-bold text-indigo-700">{{ invitadoCount() }}</p>
                  <span class="text-xs text-indigo-500 mb-1 font-medium">invitado</span>
                </div>
              </div>

            </div>
          </div>

          <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 h-fit space-y-3">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Seguridad de cuenta</h3>
            <button class="w-full py-3 bg-slate-900 text-white rounded-xl font-semibold hover:bg-slate-800 transition shadow-lg shadow-slate-200">
              Editar Perfil
            </button>
            <button class="w-full py-3 bg-white text-slate-600 border border-slate-200 rounded-xl font-semibold hover:bg-slate-50 transition">
              Cambiar Password
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="flex flex-col items-center justify-center p-20">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
    <p class="text-slate-400 font-medium">Sincronizando perfil...</p>
  </div>
}
